general.live_config_reload = true

general.import = [
    "~/.config/alacritty/my_themes/coolnight.toml"
]

[cursor]
style.shape = "underline"

[env]
TERM = "xterm-256color"

[window]
decorations = "Buttonless"
dynamic_padding = false
opacity = 0.8
blur = true
option_as_alt = "Both"

[window.padding]
x = 20
y = 20


[font]
# normal.family = "MesloLGL Nerd Font mono"
normal.family = "MesloLGL Nerd Font Mono"
size = 14
